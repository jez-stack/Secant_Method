<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Numerical Methods Calculator{% endblock %}</title>
  <script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <button class="back-to-top" id="backToTop">↑</button>
  <div class="container">
    <div class="header">
      <span class="icon">🔢</span>
      <h1>Numerical Methods</h1>
      <p class="subtitle">Root-Finding Calculators</p>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>© 2026 Secant Method Calculator • PIT Project • CPE 2A</p>
      <p>Numerical Methods • Educational Tool</p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
